name: Build Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        default: v1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Make scripts executable
        run: chmod +x scripts/build_app.sh scripts/package_release.sh scripts/prepare_sparkle_release.sh scripts/set_version.sh scripts/versioning.sh

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare Sparkle release
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./scripts/prepare_sparkle_release.sh "${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/MacMemoApp.dmg
            docs/updates/appcast.xml

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
